name: Build SilverBullet
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - name: Restore NuGet Packages
        run: |
          $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
          nuget restore $slnFile.FullName
      - name: Build Solution
        run: |
          $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
          msbuild $slnFile.FullName /p:Configuration=Release /p:Platform="Any CPU"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Executable
          path: "**/bin/Release/"
