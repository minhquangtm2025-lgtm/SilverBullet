name: Build SilverBullet REAL EXE ONLY

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      - name: Find Solution
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { exit 1 }
          "SLN=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        run: nuget restore "$env:SLN"

      - name: Build
        shell: pwsh
        run: |
          msbuild "$env:SLN" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
          exit 0

      # 📤 CHỈ HỐT FILE CHẠY (.EXE/.DLL) - LOẠI BỎ CODE RÁC
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-THE-REAL-APP
          path: |
            **/bin/Release/
            **/bin/*/Release/
            **/*.exe
            **/*.dll
            **/*.config
          # 🛑 Đuổi cổ đống code .cs và .csproj gây rối mắt
          exclude: |
            **/*.cs
            **/*.csproj
            **/*.sln
            .github/**
            packages/**
