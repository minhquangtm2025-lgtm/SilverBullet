name: Build SilverBullet Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      - name: Find Solution
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { throw "Không tìm thấy file .sln!" }
          "SLN=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        run: nuget restore "$env:SLN"

      - name: Build
        shell: pwsh
        run: msbuild "$env:SLN" /p:Configuration=Release /p:Platform="x64" /verbosity:minimal

      # 📤 BƯỚC QUYẾT ĐỊNH: Lấy toàn bộ những gì có trong máy ảo sau khi build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Build
          path: |
            **/bin/Release/
            **/*.nupkg
            **/*.exe
            **/*.dll
          if-no-files-found: warn # Không báo lỗi đỏ nếu thiếu 1 vài file lẻ
