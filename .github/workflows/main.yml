name: Build SilverBullet ULTIMATE FINAL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      - name: Find Solution
        shell: pwsh
        run: |
          Write-Host "🔍 Searching for .sln file..."
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) {
            Write-Error "❌ Không tìm thấy file .sln!"
            exit 1
          }
          Write-Host "✅ Found: $($sln.FullName)"
          "SLN=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        run: |
          Write-Host "📦 Restoring packages..."
          nuget restore "$env:SLN"

      - name: Build
        shell: pwsh
        run: |
          Write-Host "⚙️ Building solution..."
          msbuild "$env:SLN" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
          exit 0

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Build
          path: |
            **/bin/Release/**
            **/*.exe
            **/*.dll
            **/*.nupkg
          if-no-files-found: warn
