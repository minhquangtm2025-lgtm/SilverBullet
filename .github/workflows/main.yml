name: Build SilverBullet Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # 🔥 đảm bảo không thiếu .NET
      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      # 🔍 tìm file .sln
      - name: Find Solution
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { throw "Không tìm thấy .sln" }
          echo "SLN=$($sln.FullName)" >> $env:GITHUB_ENV

      # 📦 restore
      - name: Restore
        run: nuget restore $env:SLN

      # ⚙️ build
      - name: Build
        run: msbuild $env:SLN /p:Configuration=Release /p:Platform="x64" /verbosity:minimal

      # 📤 upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Build
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
