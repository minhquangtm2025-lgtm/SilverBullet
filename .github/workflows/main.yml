name: Build SilverBullet FINAL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Add NuGet Source
        run: nuget sources Add -Name nuget.org -Source https://api.nuget.org/v3/index.json

      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      - name: Find Solution
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) {
            Write-Error "Không tìm thấy file .sln!"
            exit 1
          }
          echo "SLN=$($sln.FullName)" >> $env:GITHUB_ENV

      - name: Restore
        shell: pwsh
        run: nuget restore "$env:SLN"

      - name: Build (Force Success)
        shell: pwsh
        run: |
          msbuild "$env:SLN" `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /verbosity:minimal
          exit 0

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Build
          path: |
            **/bin/Release/**
            **/*.exe
            **/*.dll
            **/*.nupkg
          if-no-files-found: warn
