name: Build SilverBullet Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # Bước này cực kỳ quan trọng để không lỗi build
      - name: Install .NET Framework 4.7.2
        run: choco install netfx-4.7.2-devpack -y

      # Tìm file .sln linh hoạt
      - name: Find Solution
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { throw "Không tìm thấy file .sln!" }
          "SLN=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Restore NuGet - đã bỏ -Property gây lỗi
      - name: Restore
        shell: pwsh
        run: nuget restore "$env:SLN"

      # Build với Platform Any CPU để khớp với net20 trong log của bạn
      - name: Build
        shell: pwsh
        run: msbuild "$env:SLN" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      # 📤 BƯỚC "HÁI QUẢ": Quét toàn bộ để lấy file net20 và nupkg
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SilverBullet-Build
          path: |
            **/bin/Release/
            **/*.nupkg
            **/*.dll
            **/*.exe
          if-no-files-found: warn
